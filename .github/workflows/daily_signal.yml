name: Daily Signal Save

on:
  schedule:
    # 00:10 UTC = 09:10 KST (월~금) — TASK 2 전용: 전날 신호 → 오늘 시가 체결 기록
    - cron: "10 0 * * 1-5"
    # 07:10 UTC = 16:10 KST (월~금) — TASK 1+2+3 전체: 신호저장 + 체결 + 포트폴리오
    - cron: "10 7 * * 1-5"
  workflow_dispatch:   # 수동 실행 허용 (테스트용)

jobs:
  save-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run save_daily_signals (09:10 KST — task2 only)
        if: github.event.schedule == '10 0 * * 1-5'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/save_daily_signals.py --task2-only

      - name: Run save_daily_signals (16:10 KST — full)
        if: github.event.schedule == '10 7 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/save_daily_signals.py

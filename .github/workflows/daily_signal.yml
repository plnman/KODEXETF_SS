name: Daily Signal Save (16:10 KST)

on:
  schedule:
    # 07:10 UTC = 16:10 KST (월~금) — TASK 1+2+3 전체 실행
    # T일 종가 신호 저장 + T+1일 시가 체결 기록 → 백테스팅 철학과 동일
    - cron: "10 7 * * 1-5"
  workflow_dispatch:   # 수동 실행 허용 (테스트용)

jobs:
  save-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run save_daily_signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/save_daily_signals.py

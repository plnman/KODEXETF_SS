name: "KODEX IRP Daily Protocol"

on:
  schedule:
    # KST 15:40 = UTC 06:40 (매주 월요일~금요일 한국 장 마감 후 즉시 수급 분석)
    - cron: "40 6 * * 1-5"
  # 원할 때 Github에서 직접 버튼 눌러서 강제 실험해 볼 수 있도록 수동 트리거 오픈
  workflow_dispatch:

jobs:
  run-daily-screener:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🚀 Set up 방탄 Python 3.11 Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: 📦 Install AI/Data dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: 💡 Run Manual Trading Signal Broadcaster (Telegram 텔레그램 수동 제어 알리미)
      env:
        # Github Repository Secrets 탭에서 값을 물고 옵니다.
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        export PYTHONPATH=$(pwd)
        python notifier/telegram_bot.py || echo "🚨 텔레그램 봇 실행 중 간헐적인 YFinance 통신 오류 등이 터져도 전체 프로세스를 멈추지 않고 안전하게 스킵합니다."
